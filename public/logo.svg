<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Meccha Chameleon mascot holding a brick">
  <title>Meccha Chameleon mascot holding a brick</title>
  <defs>
    <!-- Realistic red brick texture, painted straight in SVG.
         The body intentionally uses the same brick pattern as the
         background to mimic the "body merges into wall" effect of
         the original Meccha Chameleon fan logo. -->
    <linearGradient id="mascotWallShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2218"/>
      <stop offset="0.18" stop-color="#5a3322"/>
      <stop offset="0.55" stop-color="#7a3a23"/>
      <stop offset="1" stop-color="#2b160e"/>
    </linearGradient>
    <pattern id="mascotBricks" x="0" y="0" width="220" height="96" patternUnits="userSpaceOnUse">
      <rect width="220" height="96" fill="#8a3a23"/>
      <path d="M0 0 H220 M0 48 H220" stroke="#3b1d12" stroke-width="6"/>
      <path d="M0 0 V48 M55 0 V48 M55 48 V96 M110 0 V48 M165 0 V48 M165 48 V96" stroke="#3b1d12" stroke-width="4"/>
      <path d="M5 6 H215 M5 54 H215" stroke="#f3e6d2" stroke-width="3" stroke-opacity="0.45"/>
      <path d="M5 12 H215" stroke="#f3e6d2" stroke-width="2" stroke-opacity="0.25"/>
    </pattern>
    <radialGradient id="mascotHead" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#f3eee7"/>
      <stop offset="1" stop-color="#d9cdbb"/>
    </radialGradient>
    <radialGradient id="mascotHighlight" cx="0.35" cy="0.3" r="0.45">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="mascotShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="6" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background wall slab the mascot is standing in front of -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#mascotWallShade)"/>
  <rect x="60" y="40" width="904" height="944" fill="url(#mascotBricks)" opacity="0.92"/>

  <!-- Subtle vignette so the mascot stands out -->
  <radialGradient id="mascotVignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.45"/>
  </radialGradient>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#mascotVignette)"/>

  <!-- Mascot: body silhouette in white, then the brick-textured torso.
       Pose: standing slightly to the right, right arm raised holding a brick,
       left arm relaxed at the side, brick "U" mark on the right upper arm. -->
  <g filter="url(#mascotShadow)">
    <!-- Right arm (raised, holding brick) -->
    <path d="M650 360 q80 -60 200 -90 q40 -10 70 14 q22 18 6 50 q-22 38 -84 64 q-100 42 -180 78 z"
          fill="#ffffff" stroke="#1a0f0c" stroke-width="6" stroke-linejoin="round"/>

    <!-- Brick the arm is holding (slightly above the hand) -->
    <g transform="translate(900 270) rotate(-12)">
      <rect x="0" y="0" width="220" height="96" rx="6" fill="#8a3a23" stroke="#1a0f0c" stroke-width="6"/>
      <path d="M0 0 H220 M0 48 H220" stroke="#3b1d12" stroke-width="5"/>
      <path d="M0 0 V48 M55 0 V48 M55 48 V96 M110 0 V48 M165 0 V48 M165 48 V96" stroke="#3b1d12" stroke-width="3"/>
      <path d="M5 6 H215" stroke="#f3e6d2" stroke-width="3" stroke-opacity="0.45"/>
    </g>

    <!-- Brown "U" stamp on the upper arm -->
    <g transform="translate(720 410) rotate(-12)">
      <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700"
            fill="#7a3a1a" stroke="#1a0f0c" stroke-width="3" paint-order="stroke fill">U</text>
    </g>

    <!-- Left arm (relaxed, hanging down) -->
    <path d="M520 540 q-40 90 -38 220 q1 50 30 64 q34 16 60 -10 q26 -28 6 -90 q-22 -68 -28 -160 z"
          fill="#ffffff" stroke="#1a0f0c" stroke-width="6" stroke-linejoin="round"/>

    <!-- Body: filled with the brick texture so it merges with the wall,
         with a thick white outline so the silhouette still reads. -->
    <path d="M430 360
             q -20 60 -10 150
             q 10 110 60 200
             q 60 110 200 140
             q 140 30 240 -20
             q 90 -45 110 -130
             q 18 -80 -10 -180
             q -28 -100 -90 -160
             q -90 -90 -250 -90
             q -160 0 -250 90 z"
          fill="url(#mascotBricks)" stroke="#ffffff" stroke-width="22" stroke-linejoin="round"/>
    <path d="M430 360
             q -20 60 -10 150
             q 10 110 60 200
             q 60 110 200 140
             q 140 30 240 -20
             q 90 -45 110 -130
             q 18 -80 -10 -180
             q -28 -100 -90 -160
             q -90 -90 -250 -90
             q -160 0 -250 90 z"
          fill="none" stroke="#1a0f0c" stroke-width="6" stroke-linejoin="round"/>

    <!-- Head: big white round head -->
    <circle cx="600" cy="280" r="190" fill="url(#mascotHead)" stroke="#1a0f0c" stroke-width="8"/>
    <ellipse cx="540" cy="240" rx="120" ry="80" fill="url(#mascotHighlight)"/>

    <!-- Smiling face: two arc eyes + arc mouth -->
    <path d="M500 240 q24 36 0 60 q-24 -24 0 -60 z" fill="#1a0f0c"/>
    <path d="M580 240 q24 36 0 60 q-24 -24 0 -60 z" fill="#1a0f0c"/>
    <path d="M510 340 q60 50 130 6" fill="none" stroke="#1a0f0c" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
