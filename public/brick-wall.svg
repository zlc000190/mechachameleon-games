<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d321e"/>
      <stop offset="0.55" stop-color="#6b2a18"/>
      <stop offset="1" stop-color="#552110"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.85" numOctaves="2" seed="9" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="320" height="160" fill="#d8c9b3"/>
  <g stroke="#d8c9b3" stroke-width="4">
    <!-- row 1 -->
    <rect x="0" y="0" width="78" height="30" fill="url(#shade)"/>
    <rect x="82" y="0" width="78" height="30" fill="#74301d"/>
    <rect x="164" y="0" width="78" height="30" fill="#8a3a23"/>
    <rect x="246" y="0" width="78" height="30" fill="#652716"/>
    <!-- row 2 staggered -->
    <rect x="-40" y="34" width="78" height="30" fill="#5d2414"/>
    <rect x="42" y="34" width="78" height="30" fill="#8a3a23"/>
    <rect x="124" y="34" width="78" height="30" fill="#6f2d1b"/>
    <rect x="206" y="34" width="78" height="30" fill="#7f351f"/>
    <rect x="288" y="34" width="78" height="30" fill="#612616"/>
    <!-- row 3 -->
    <rect x="0" y="68" width="78" height="30" fill="#7a301c"/>
    <rect x="82" y="68" width="78" height="30" fill="#642816"/>
    <rect x="164" y="68" width="78" height="30" fill="#8c3e26"/>
    <rect x="246" y="68" width="78" height="30" fill="#6b2a18"/>
    <!-- row 4 staggered -->
    <rect x="-40" y="102" width="78" height="30" fill="#6a2a18"/>
    <rect x="42" y="102" width="78" height="30" fill="#7f351f"/>
    <rect x="124" y="102" width="78" height="30" fill="#5d2414"/>
    <rect x="206" y="102" width="78" height="30" fill="#884027"/>
    <rect x="288" y="102" width="78" height="30" fill="#642816"/>
    <!-- row 5 -->
    <rect x="0" y="136" width="78" height="30" fill="#622615"/>
    <rect x="82" y="136" width="78" height="30" fill="#8a3a23"/>
    <rect x="164" y="136" width="78" height="30" fill="#70301c"/>
    <rect x="246" y="136" width="78" height="30" fill="#572113"/>
  </g>
  <rect width="320" height="160" filter="url(#noise)" opacity="0.9"/>
  <rect width="320" height="160" fill="rgba(0,0,0,0.06)"/>
</svg>
